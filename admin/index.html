<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Quản Trị Lễ Sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css"> </head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Trang Quản Lý Admin</h2>
        <div>
            <button onclick="runScheduler()" class="btn btn-primary">Chạy Chia Lịch Tự Động</button>
            <a href="../" class="btn btn-secondary">Về Trang Chủ</a>
        </div>
    </div>

    <div class="church-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Số ca đã đăng ký</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyP-P-zZOTqsU_dn7VwzEXJmtpeS2-SNbKNL5u6WEZEe57lsmJkzgHDmw9ZZqAkSJ03/exec";

    // Load dữ liệu khi mở trang
    async function loadData() {
        const res = await fetch(`${WEB_APP_URL}?action=getAdminData`);
        const data = await res.json();
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.count}</td>
            </tr>
        `).join('');
    }

    async function runScheduler() {
        if(!confirm("Bạn có muốn chạy thuật toán chia lịch không?")) return;
        const res = await fetch(`${WEB_APP_URL}?action=runPhanBo`);
        const data = await res.json();
        alert(data.message);
    }

    loadData();
</script>
</body>
</html>
