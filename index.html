<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Lịch Lễ Sinh</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        #loading { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 9999; 
            justify-content: center; align-items: center; flex-direction: column; 
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner-border" style="color: var(--church-blue);"></div>
    <div class="mt-2 fw-bold" style="color: var(--church-blue);">Đang kết nối hệ thống...</div>
</div>

<div class="container py-4">
    <div id="loginBox" class="mx-auto" style="max-width: 400px; margin-top: 15vh;">
        <div class="church-card text-center p-4">
            <h4 class="fw-bold mb-4" style="color: var(--church-blue);">ĐĂNG KÝ CA TRỰC</h4>
            <input type="text" id="idInput" class="form-control mb-4 text-center form-control-lg" placeholder="Nhập ID của em...">
            <button onclick="handleLogin()" id="btnLogin" class="btn btn-submit-main w-100">Bắt Đầu Chọn Lịch</button>
        </div>
    </div>

    <div id="mainBox" class="d-none mx-auto" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded shadow-sm" style="background: var(--white); border-left: 5px solid var(--church-gold);">
            <h5 id="welcomeMsg" class="mb-0 fw-bold" style="color: var(--church-blue);"></h5>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm rounded-pill px-3">Thoát</button>
        </div>

        <div id="calendarArea" style="padding-bottom: 20px;"></div>

        <div class="fixed-bottom p-3" style="background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);">
            <div class="container text-center" style="max-width: 600px;">
                <button onclick="submitData()" class="btn btn-submit-main w-auto py-2 px-5 shadow-sm">
                    Xác nhận & Gửi lịch
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // BẠN NHỚ DÁN LẠI LINK WEB APP MỚI NHẤT VÀO ĐÂY NHÉ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwY54eX4lY2hAbqBT22b1Rmb-3ONinAekJ6ussRGyCay8Vg2YWlxIS0eh7JKHrz-QNH/exec";
    
    let currentId = "";
    let mySelections = [];

    async function handleLogin() {
        const id = document.getElementById('idInput').value.trim().toLowerCase();
        if(!id) return alert("Nhập ID đi ông bạn ơi!");

        showLoading(true);
        try {
            // Chỉ gọi 1 lần duy nhất!
            const response = await fetch(`${WEB_APP_URL}?action=login&id=${id}`);
            const result = await response.json();

            if (result.success) {
                currentId = result.id;
                mySelections = result.selections; // Lịch cũ đã có sẵn ở đây

                document.getElementById('loginBox').classList.add('d-none');
                document.getElementById('mainBox').classList.remove('d-none');
                document.getElementById('welcomeMsg').innerText = "Chào " + result.name + " (" + result.id + ")";
                renderCalendar();
            } else {
                alert(result.message);
            }
        } catch(e) {
            alert("Server đang bận, thử lại sau nhé!");
        } finally {
            showLoading(false);
        }
    }

    function renderCalendar() {
        const days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chúa Nhật"];
        const area = document.getElementById('calendarArea');
        area.innerHTML = "";

        days.forEach(d => {
            const shifts = (d === "Chúa Nhật") ? ["5g", "7g", "16g", "17g30"] : ["Sáng", "Chiều"];
            
            // Tạo các nút chọn ca
            let buttons = shifts.map(s => {
                const isSelected = mySelections.some(x => x.day.trim() === d.trim() && x.shift.trim() === s.trim());
                // Chú ý class được đổi thành 'shift-btn' để ăn theo file CSS
                return `<button class="btn shift-btn ${isSelected ? 'selected' : ''}" 
                                onclick="toggleShift('${d}', '${s}', this)">${s}</button>`;
            }).join('');

            // Đổ dữ liệu ra khung HTML
            area.innerHTML += `
                <div class="church-card">
                    <div class="day-title">${d}</div>
                    <div class="d-flex flex-wrap">${buttons}</div>
                </div>`;
        });
    }

    function toggleShift(day, shift, btn) {
        const d = day.trim();
        const s = shift.trim();
        const idx = mySelections.findIndex(x => x.day.trim() === d && x.shift.trim() === s);
        
        if (idx > -1) {
            // Bỏ chọn
            mySelections.splice(idx, 1);
            btn.classList.remove('selected');
        } else {
            // Chọn
            mySelections.push({ day: d, shift: s });
            btn.classList.add('selected');
        }
    }

    async function submitData() {
        const finalSelections = mySelections.filter(x => x.day && x.shift);
        if(finalSelections.length === 0) return alert("Em vui lòng chọn ít nhất 1 ca trực nhé!");
        if(!confirm(`Xác nhận đăng ký ${finalSelections.length} ca trực? Dữ liệu cũ của em sẽ được làm mới.`)) return;

        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Bắt buộc cho Google Apps Script
                body: JSON.stringify({ id: currentId, registrations: finalSelections })
            });
            alert("Đã gửi thành công! Lịch của em đã được cập nhật.");
            location.reload();
        } catch(e) {
            alert("Có lỗi xảy ra khi gửi dữ liệu!");
        } finally {
            showLoading(false);
        }
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
